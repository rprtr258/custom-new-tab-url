<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Custom New Tab URL</title>
  <link rel="stylesheet" href="css/newtab.css">
  <script src="js/newtab.js"></script>
</head>
<body>
  <header id="header">
    <img id="logo" src="icons/icon128.png" alt="logo">
    <h1>Custom New Tab URL</h1>
  </header>

  <main id="actions">
    <div class="action-card" id="open-url-link" tabindex="0" role="button">
      <div class="action-icon url-icon"></div>
      <span>Open saved URL</span>
    </div>
    <div class="action-card" id="options-link" tabindex="0" role="button">
      <div class="action-icon options-icon"></div>
      <span>Options page</span>
    </div>
  </main>

  <footer id="footer"></footer>
</body>
</html>
